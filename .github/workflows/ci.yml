name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Verify formatting
        run: task fmt:check

      - name: Vet
        run: task vet

      - name: Check dependency licenses
        run: task licenses:check

      - name: Validate Taskrail tracked-work state and live spec refs  # hard failure gate
        run: task workflow:validate

      - name: Verify mirrored workflow skills
        run: task workflow:check-skills

      - name: Report active milestone spec coverage  # advisory
        run: task workflow:verify:spec

      - name: Validate GoReleaser config
        run: task release:check

  unit-tests:
    needs: checks
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Unit tests
        run: task test

  smoke-tests:
    needs: checks
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Build binary
        run: task build

      - name: Smoke test --help
        run: ./tessariq --help

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Integration tests
        run: task test:integration

      - name: Cleanup orphaned Docker resources
        if: always()
        run: |
          docker ps -aq --filter "name=tessariq-" | xargs -r docker rm -f || true
          docker network ls --filter "name=tessariq-" -q | xargs -r docker network rm || true
          docker images --filter "reference=tessariq-test-*" -q | xargs -r docker rmi -f || true

  e2e-tests:
    needs: [unit-tests, smoke-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: End-to-end tests
        run: task test:e2e

      - name: Cleanup orphaned Docker resources
        if: always()
        run: |
          docker ps -aq --filter "name=tessariq-" | xargs -r docker rm -f || true
          docker network ls --filter "name=tessariq-" -q | xargs -r docker network rm || true
          docker images --filter "reference=tessariq-test-*" -q | xargs -r docker rmi -f || true

  mutation-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Run mutation tests
        run: task test:mutate:gate
