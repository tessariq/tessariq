name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files need gofmt:" >&2
            echo "$fmt_out" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@v2.0.1

      - name: Check dependency licenses
        run: go-licenses check ./cmd/tessariq --allowed_licenses=Apache-2.0,MIT,BSD-3-Clause,ISC,AGPL-3.0

      - name: Validate tracked-work state and live spec refs
        run: go run ./cmd/tessariq-workflow validate-state

      - name: Verify mirrored workflow skills
        run: go run ./cmd/tessariq-workflow check-skills

      - name: Verify active milestone spec coverage
        run: go run ./cmd/tessariq-workflow verify --profile spec --disposition report --json

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check

  unit-tests:
    needs: checks
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: go test ./...

  smoke-tests:
    needs: checks
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: CGO_ENABLED=0 go build -o tessariq ./cmd/tessariq

      - name: Smoke test --help
        run: ./tessariq --help

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        run: go test -tags=integration ./...

      - name: Cleanup orphaned Docker resources
        if: always()
        run: |
          docker ps -aq --filter "name=tessariq-" | xargs -r docker rm -f || true
          docker network ls --filter "name=tessariq-" -q | xargs -r docker network rm || true
          docker images --filter "reference=tessariq-test-*" -q | xargs -r docker rmi -f || true

  e2e-tests:
    needs: [integration-tests, smoke-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: End-to-end tests
        run: go test -tags=e2e ./... -count=1 -timeout=15m

      - name: Cleanup orphaned Docker resources
        if: always()
        run: |
          docker ps -aq --filter "name=tessariq-" | xargs -r docker rm -f || true
          docker network ls --filter "name=tessariq-" -q | xargs -r docker network rm || true
          docker images --filter "reference=tessariq-test-*" -q | xargs -r docker rmi -f || true

  mutation-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0

      - name: Run mutation tests
        run: gremlins unleash --exclude-files 'cmd/.*|internal/testutil/.*' --threshold-efficacy 70
