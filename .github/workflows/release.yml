name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      # --- Tag push: real, published release ---

      - name: Guard CHANGELOG has a section for this tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./scripts/check-changelog-version.sh "${GITHUB_REF_NAME}"

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./scripts/changelog-release-notes.sh "${GITHUB_REF_NAME}" > "${RUNNER_TEMP}/release-notes.md"

      - name: Guard release notes are non-empty
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ ! -s "${RUNNER_TEMP}/release-notes.md" ]; then
            echo "guard: release notes file is empty; refusing to publish a release with a blank body" >&2
            exit 1
          fi
          echo "guard: release notes present ($(wc -c < "${RUNNER_TEMP}/release-notes.md") bytes)"

      - name: Run GoReleaser (publish)
        if: startsWith(github.ref, 'refs/tags/v')
        run: goreleaser release --clean --release-notes="${RUNNER_TEMP}/release-notes.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Manual dispatch: snapshot only, no GitHub Release ---

      - name: Run GoReleaser (snapshot, no publish)
        if: github.event_name == 'workflow_dispatch'
        run: task release:dry
