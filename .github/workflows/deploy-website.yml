name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Build website
        working-directory: website
        run: hugo --minify

      - name: Deploy to BunnyCDN
        uses: R-J-dev/bunny-deploy@v3.0.0
        with:
          storage-zone-password: ${{ secrets.BUNNY_STORAGE_ZONE_PASSWORD }}
          directory-to-upload: "website/public"
          storage-endpoint: ${{ vars.BUNNY_STORAGE_ENDPOINT }}
          storage-zone-name: ${{ vars.BUNNY_STORAGE_ZONE_NAME }}
          enable-delete-action: true
          enable-purge-pull-zone: true
          access-key: ${{ secrets.BUNNY_ACCESS_KEY }}
          pull-zone-id: ${{ vars.BUNNY_PULL_ZONE_ID }}
          concurrency: "50"
          replication-timeout: "15000"
