name: Container Images

on:
  push:
    branches: [main]
    paths:
      - "runtime/**"
      - ".github/workflows/images.yml"
  pull_request:
    paths:
      - "runtime/**"
      - ".github/workflows/images.yml"
  workflow_dispatch:

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CLAUDE_CODE_IMAGE: ghcr.io/tessariq/claude-code
  OPENCODE_IMAGE: ghcr.io/tessariq/opencode
  REFERENCE_IMAGE: ghcr.io/tessariq/reference-runtime

jobs:
  build-reference:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build reference runtime
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: runtime/reference
          file: runtime/reference/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: true
          tags: ${{ env.REFERENCE_IMAGE }}:v0.1.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-test:
    needs: build-reference
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: claude-code
            image-env: CLAUDE_CODE_IMAGE
            binary: claude
            version-flag: "--version"
          - agent: opencode
            image-env: OPENCODE_IMAGE
            binary: opencode
            version-flag: "--version"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/tessariq/${{ matrix.agent }}
          tags: |
            type=raw,value=v0.1.0
            type=sha,prefix=

      - name: Build image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: runtime/${{ matrix.agent }}
          file: runtime/${{ matrix.agent }}/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to: type=gha,mode=max,scope=${{ matrix.agent }}

      - name: Test agent binary exists
        run: |
          docker run --rm ghcr.io/tessariq/${{ matrix.agent }}:v0.1.0 \
            which ${{ matrix.binary }}

      - name: Test agent binary runs
        run: |
          version=$(docker run --rm ghcr.io/tessariq/${{ matrix.agent }}:v0.1.0 \
            ${{ matrix.binary }} ${{ matrix.version-flag }} 2>&1 || true)
          echo "Agent version output: $version"
          if [ -z "$version" ]; then
            echo "ERROR: agent binary produced no version output"
            exit 1
          fi

      - name: Test non-root user
        run: |
          user=$(docker run --rm ghcr.io/tessariq/${{ matrix.agent }}:v0.1.0 whoami)
          echo "Container user: $user"
          if [ "$user" = "root" ]; then
            echo "ERROR: container must not run as root"
            exit 1
          fi

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/tessariq/${{ matrix.agent }}:v0.1.0
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: runtime/${{ matrix.agent }}
          file: runtime/${{ matrix.agent }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.agent }}

      - name: Output digest
        if: github.event_name != 'pull_request'
        run: |
          echo "## ${{ matrix.agent }} image" >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: \`${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Update DefaultImage in Go code to:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`ghcr.io/tessariq/${{ matrix.agent }}@${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
