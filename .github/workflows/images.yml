name: Container Images

on:
  push:
    branches: [main]
    paths:
      - "runtime/**"
      - ".github/workflows/images.yml"
      - "Taskfile.yml"
  pull_request:
    paths:
      - "runtime/**"
      - ".github/workflows/images.yml"
      - "Taskfile.yml"
  workflow_dispatch:

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: task images:build

      - name: Test image binaries and non-root user
        run: task images:test

      - name: Scan for vulnerabilities
        run: task images:scan

      - name: Push images
        if: github.event_name != 'pull_request'
        run: task images:push

      - name: Output digests
        if: github.event_name != 'pull_request'
        run: |
          for image in claude-code opencode; do
            digest=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/tessariq/${image}:v0.1.0" 2>/dev/null | sed 's/.*@//')
            echo "## ${image}" >> "$GITHUB_STEP_SUMMARY"
            echo "Digest: \`${digest}\`" >> "$GITHUB_STEP_SUMMARY"
          done
