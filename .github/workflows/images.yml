name: Container Images

on:
  push:
    branches: [main]
    paths:
      - "runtime/**"
      - ".github/workflows/images.yml"
  pull_request:
    paths:
      - "runtime/**"
      - ".github/workflows/images.yml"
  workflow_dispatch:

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build reference runtime
        run: |
          docker build \
            -t ghcr.io/tessariq/reference-runtime:v0.1.0 \
            -f runtime/reference/Dockerfile \
            runtime/reference

      - name: Build agent images
        run: |
          for agent in claude-code opencode; do
            docker build \
              -t "ghcr.io/tessariq/${agent}:v0.1.0" \
              -f "runtime/${agent}/Dockerfile" \
              "runtime/${agent}"
          done

      - name: Test claude binary
        run: |
          docker run --rm ghcr.io/tessariq/claude-code:v0.1.0 claude --version

      - name: Test opencode binary
        run: |
          docker run --rm ghcr.io/tessariq/opencode:v0.1.0 opencode --version

      - name: Test non-root user
        run: |
          for agent in claude-code opencode; do
            user=$(docker run --rm "ghcr.io/tessariq/${agent}:v0.1.0" whoami)
            echo "${agent}: ${user}"
            if [ "$user" = "root" ]; then
              echo "ERROR: ${agent} container must not run as root"
              exit 1
            fi
          done

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/tessariq/claude-code:v0.1.0
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan for vulnerabilities (opencode)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/tessariq/opencode:v0.1.0
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push images
        if: github.event_name != 'pull_request'
        run: |
          for image in reference-runtime claude-code opencode; do
            docker push "ghcr.io/tessariq/${image}:v0.1.0"
          done

      - name: Output digests
        if: github.event_name != 'pull_request'
        run: |
          for image in claude-code opencode; do
            digest=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/tessariq/${image}:v0.1.0" 2>/dev/null | sed 's/.*@//')
            echo "## ${image}" >> "$GITHUB_STEP_SUMMARY"
            echo "Digest: \`${digest}\`" >> "$GITHUB_STEP_SUMMARY"
          done
