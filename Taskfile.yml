version: "3"

tasks:
  tidy:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy

  build:
    desc: Build tessariq CLI
    cmds:
      - go build ./cmd/tessariq

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:integration:
    desc: Run integration tests
    cmds:
      - go test -tags=integration ./...

  test:e2e:
    desc: Run end-to-end tests
    cmds:
      - go test -tags=e2e ./...

  test:mutate:
    desc: Run mutation testing with gremlins
    cmds:
      - gremlins unleash

  test:mutate:gate:
    desc: Run mutation testing with CI threshold
    cmds:
      - gremlins unleash --exclude-files 'cmd/.*|internal/testutil/.*' --threshold-efficacy 70

  run:
    desc: Run tessariq with no arguments
    cmds:
      - go run ./cmd/tessariq

  run:help:
    desc: Run tessariq --help
    cmds:
      - go run ./cmd/tessariq --help

  workflow:validate:
    desc: Validate tracked-work state, scope metadata, and live spec refs
    cmds:
      - go run ./cmd/tessariq-workflow validate-state

  workflow:check:
    desc: Run tracked-work validation, active-spec verification, and skill parity checks
    cmds:
      - go run ./cmd/tessariq-workflow validate-state
      - go run ./cmd/tessariq-workflow verify --profile spec --disposition report --json
      - go run ./cmd/tessariq-workflow check-skills

  workflow:next:
    desc: Select the next eligible tracked task
    cmds:
      - go run ./cmd/tessariq-workflow next --json

  workflow:refresh:
    desc: Refresh derived tracked-work state
    cmds:
      - go run ./cmd/tessariq-workflow refresh-state

  workflow:verify:spec:
    desc: Verify tracked-work coverage against the active milestone spec
    cmds:
      - go run ./cmd/tessariq-workflow verify --profile spec --disposition report --json

  workflow:check-skills:
    desc: Verify mirrored agent skill directories stay in sync
    cmds:
      - go run ./cmd/tessariq-workflow check-skills

  release:check:
    desc: Validate goreleaser configuration
    cmds:
      - goreleaser check

  release:dry:
    desc: Build snapshot release artifacts for all targets
    cmds:
      - goreleaser release --snapshot --clean
